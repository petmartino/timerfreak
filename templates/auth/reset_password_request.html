<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reset Password - TimerFreak</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body style="background-color: #00ffae">
<div class="auth-container">
    <div class="auth-card">
        <h1>Reset Password</h1>
        <p class="auth-description">Enter your email address and we'll send you a link to reset your password.</p>
        
        <form method="POST" action="{{ url_for('auth.reset_password_request') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
            </div>
            
            <button type="submit" class="btn-submit">Send Reset Link</button>
        </form>
        
        <div class="auth-footer">
            <p>Remember your password? <a href="{{ url_for('auth.login') }}">Login</a></p>
        </div>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 2rem;
}

.auth-card {
    background: white;
    border-radius: 3px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 2.5rem;
    max-width: 420px;
    width: 100%;
}

.auth-card h1 {
    text-align: center;
    margin-bottom: 0.5rem;
    color: #333;
    font-size: 1.75rem;
}

.auth-description {
    text-align: center;
    color: #666;
    margin-bottom: 1.5rem;
}

.form-group {
    margin-bottom: 1rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #333;
    font-weight: 500;
}

.form-group input[type="email"] {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 3px;
    font-size: 1rem;
    box-sizing: border-box;
}

.form-group input:focus {
    outline: none;
    border-color: #0cd413;
    box-shadow: 0 0 0 3px rgba(12, 212, 19, 0.1);
}

.btn-submit {
    width: 100%;
    padding: 0.875rem;
    background: #0cd413;
    color: white;
    border: none;
    border-radius: 3px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

.btn-submit:hover {
    background: #0ab811;
}

.auth-footer {
    margin-top: 1.5rem;
    text-align: center;
    color: #666;
}

.auth-footer a {
    color: #0cd413;
    text-decoration: none;
    font-weight: 500;
}

.auth-footer a:hover {
    text-decoration: underline;
}
</style>

</div>

        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w71gu3ru80");
</script>
</body>
</html>
